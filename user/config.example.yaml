app:
  default_role: default
  browser_headless: true     # 是否无头模式运行浏览器；Ubuntu 远程桌面若要显示窗口可设为 false，服务会尝试自动继承图形会话环境
  browser_channel: ""        # 本地浏览器：可填 "chrome" / "chromium" / "msedge" 或绝对路径，如 /usr/bin/google-chrome
  browser_user_agent: ""     # 自定义 User-Agent，留空则自动隐藏 Headless 特征
  browser_window_size: ""    # 自定义浏览器窗口尺寸，例如 "1920,1080"，留空则随机生成常见尺寸
  browser_idle_timeout: 300  # 可选: 浏览器空闲多少秒后自动关闭以释放内存。0 为不自动关闭
  browser_cdp_wait_seconds: 45  # 可选: 等待 Chrome CDP 调试端口就绪的最大秒数。冷启动慢或端口冲突回落时可适当调高
  telegram_bot_token: ""     # Telegram Bot Token，通过 @BotFather 申请后填入。留空则不启用 Telegram 渠道
  telegram_proxy_url: ""     # 代理地址（可选），在无法直连 Telegram 的环境下配置。支持 HTTP/SOCKS5，例如：
                             #   socks5://127.0.0.1:1080
                             #   http://192.168.1.1:7890
  http_api_token: ""        # HTTP API 访问令牌。留空时启动/重启会自动生成并写回配置文件；除 /health 外所有接口必须携带 Authorization: Bearer <token>
  server_host: 127.0.0.1    # HTTP 服务监听地址。127.0.0.1 = 仅本机可访问（默认，最安全）；0.0.0.0 = 监听所有网卡，局域网/公网均可访问（务必配合 http_api_token 与防火墙使用）。也可填具体网卡 IP（如 192.168.1.10）仅暴露该网卡
  server_port: 8765         # HTTP 服务监听端口
  show_tool_calls: true      # 是否在所有消息渠道显示工具调用信息；设为 false 时 CLI/HTTP/Telegram 均不显示工具进度
  stream_idle_timeout_seconds: 60   # 流式队列无新事件时的进展检查/心跳间隔；实际卡住判定会按操作类型使用更长阈值
  max_attachment_size_mb: 50       # Telegram/HTTP 附件大小上限，单位 MB；文件类型不限制，是否可解析由 Agent/LLM 自行判断

llm:
  api_key: sk-xxxxxxxx
  model: gpt-5.2
  base_url: https://your-openai-compatible-server.example/v1
  supports_vision: auto       # 主模型是否支持图片输入：auto 自动按模型名判断；true 强制直传图片；false 使用 vision 辅助模型

vision:
  enabled: true               # 是否处理图片附件
  fallback_enabled: true      # 主模型不支持图片时，是否调用辅助视觉模型识别后再交给主模型
  model: ""                   # 辅助视觉模型；可留空。留空且主模型不支持图片时，不识别图片，只把情况告知主模型
  base_url: ""                # 留空则复用 llm.base_url
  api_key: ""                 # 留空则复用 llm.api_key
  detail: auto                # OpenAI image_url.detail：auto / low / high
  max_images_per_message: 4
  max_image_size_mb: 10
  # prompt 可省略或留空；未配置时使用程序内置的默认图片识别提示词。
  # 如需自定义辅助视觉模型的识别要求，可取消下面注释：
  # prompt: |
  #   请详细识别用户发送的图片内容。请包括：
  #   1. 图片中的主体、场景、文字、表格、代码、界面或物体；
  #   2. 如果图片中有文字，请尽量完整 OCR；
  #   3. 如果用户问题依赖图片细节，请指出关键信息；
  #   4. 不要编造看不清的内容，看不清请说明。

paths:
  roles_dir: user/roles
  memory_dir: .memory
  attachments_dir: .tmp/attachments
  external_skills_dir: ""    # 可选：额外扫描/读取的外部技能目录；install_skill 默认安装到当前项目 user/skills，此项不是默认安装位置

memory:
  enabled: true
  db_path: .memory/long_term_memory.sqlite3
  embedding:
    enabled: true
    model: text-embedding-3-large
    base_url: ""            # 留空则复用 llm.base_url
    api_key: ""             # 留空则复用 llm.api_key
    dimensions: 3072
    batch_size: 32
    timeout_seconds: 30
  recall:
    max_context_tokens: 1800
    bm25_top_k: 50
    vector_top_k: 50
    rrf_k: 60
    rerank_top_k: 24
    final_l1_top_k: 10
    final_l2_top_k: 4
    include_l3_profile: true
  capture:
    enabled: true
    async_enabled: true
    min_turn_chars: 20
    extract_timeout_seconds: 60
  privacy:
    pii_redaction: true
    allow_secret_memory: false
    raw_turn_retention_days: 180

research:
  enabled_backends:
    - duckduckgo              # 默认无需 API Key；可扩展为 brave / tavily
  brave_api_key: ""           # Brave Search API Key，留空则不启用
  tavily_api_key: ""          # Tavily API Key，留空则不启用
  search_timeout_seconds: 15
  max_backend_results: 10
  min_independent_sources: 3
  require_citations: true
  browser_fallback_enabled: true

scheduler:
  enabled: true
  db_path: .scheduler/tasks.sqlite3
  poll_interval_seconds: 60
  max_concurrency: 2
  default_timeout_seconds: 300
  claim_lock_seconds: 600

logging:
  level: INFO
  dir: .logs
  console: false

context:                      # 对话历史上下文压缩(防止长会话爆上下文)
  enabled: true
  engine: compressor          # 压缩引擎,预留可插拔
  threshold_percent: 0.75     # 轮后主压缩触发线(真实 input_tokens 占上下文窗口比例)
  hard_ceiling_percent: 0.90  # 轮内预检触发线(粗略估计,防单轮内 replan/repair 撑爆窗口)
  protect_first_n: 3          # 始终保留的开头消息数(首轮指令+交流)
  protect_last_n: 20          # 尾部最少保留消息数
  tail_token_budget: 20000    # 尾部 token 预算(从末尾向前累计)
  anti_thrash: true           # 反抖动:连续两次压缩节省不足 min_savings_pct% 则停止
  min_savings_pct: 10
  rescue_to_memory: true      # 压缩丢弃的窗口抢救到记忆库(可召回找回)
  context_length: 128         # 模型上下文窗口大小,单位 K(128 = 128K tokens);非 128K 模型需按实际填写(如 32K 填 32);0 用内置默认
  summary:                    # 摘要压缩用的辅助模型;留空则用主模型
    model: ""
    base_url: ""
    api_key: ""
    max_tokens: 4096          # 摘要输出 token 上限(单位 token);结构化摘要通常 1-3K,4096 足够
    abort_on_failure: false   # 摘要失败:false=插兜底摘要,true=中止压缩冻结对话
