app:
  default_role: default
  browser_headless: true     # 是否无头模式运行浏览器；Ubuntu 远程桌面若要显示窗口可设为 false，服务会尝试自动继承图形会话环境
  browser_channel: ""        # 本地浏览器：可填 "chrome" / "chromium" / "msedge" 或绝对路径，如 /usr/bin/google-chrome
  browser_user_agent: ""     # 自定义 User-Agent，留空则自动隐藏 Headless 特征
  browser_window_size: ""    # 自定义浏览器窗口尺寸，例如 "1920,1080"，留空则随机生成常见尺寸
  browser_idle_timeout: 300  # 可选: 浏览器空闲多少秒后自动关闭以释放内存。0 为不自动关闭
  telegram_bot_token: ""     # Telegram Bot Token，通过 @BotFather 申请后填入。留空则不启用 Telegram 渠道
  telegram_proxy_url: ""     # 代理地址（可选），在无法直连 Telegram 的环境下配置。支持 HTTP/SOCKS5，例如：
                             #   socks5://127.0.0.1:1080
                             #   http://192.168.1.1:7890
  stream_idle_timeout_seconds: 60   # 流式队列无新事件时的进展检查/心跳间隔；实际卡住判定会按操作类型使用更长阈值

llm:
  api_key: sk-xxxxxxxx
  model: gpt-5.2
  base_url: https://your-openai-compatible-server.example/v1

paths:
  roles_dir: user/roles
  memory_dir: .memory
  external_skills_dir: ""    # 可选配置，外部技能目录的绝对路径，例如 C:\Users\xxx\.agents\skills

memory:
  enabled: true
  db_path: .memory/long_term_memory.sqlite3
  embedding:
    enabled: true
    model: text-embedding-3-large
    base_url: ""            # 留空则复用 llm.base_url
    api_key: ""             # 留空则复用 llm.api_key
    dimensions: 3072
    batch_size: 32
    timeout_seconds: 30
  recall:
    max_context_tokens: 1800
    bm25_top_k: 50
    vector_top_k: 50
    rrf_k: 60
    rerank_top_k: 24
    final_l1_top_k: 10
    final_l2_top_k: 4
    include_l3_profile: true
  capture:
    enabled: true
    async_enabled: true
    min_turn_chars: 20
    extract_timeout_seconds: 60
  privacy:
    pii_redaction: true
    allow_secret_memory: false
    raw_turn_retention_days: 180

logging:
  level: INFO
  dir: .logs
  console: false
