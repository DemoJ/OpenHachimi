[pytest]
addopts = --cov=openhachimi_agent --cov-report=term-missing
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ; PTB v22.2+ 的 retry_after 属性弃用提醒;代码已兼容 timedelta,此警告仅噪音
    ignore:.*retry_after.*:DeprecationWarning
    ; Python 3.13 对 sqlite3.Connection.__del__ 检查更严格;已在 conftest 做确定性清理
    ignore::ResourceWarning
