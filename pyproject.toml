[project]
name = "openhachimi-agent"
version = "0.1.0"
description = "一个基于 PydanticAI 构建的自定义 Agent 项目。"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic-ai-slim[openai]>=1.0.10",
    "python-dotenv>=1.1.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
